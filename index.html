<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fund Performance Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: linear-gradient(135deg, #0d0d1a 0%, #111827 55%, #0f172a 100%);
  min-height: 100vh;
  color: #e2e8f0;
  padding: 1.5rem;
}
.header {
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 0.75rem; margin-bottom: 1.5rem;
}
.header h1 {
  font-size: 1.35rem; font-weight: 800; letter-spacing: 0.4px;
  background: linear-gradient(90deg, #60a5fa, #a78bfa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.header-right { display: flex; align-items: center; gap: 0.75rem; }
.updated { font-size: 0.76rem; color: #475569; }
.refresh-btn {
  background: rgba(96,165,250,0.12); border: 1px solid rgba(96,165,250,0.3);
  color: #60a5fa; padding: 0.4rem 1rem; border-radius: 8px;
  cursor: pointer; font-size: 0.82rem; font-weight: 600; transition: background 0.18s;
}
.refresh-btn:hover:not(:disabled) { background: rgba(96,165,250,0.22); }
.refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(440px, 1fr));
  gap: 1.2rem;
}
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 18px; overflow: hidden;
  transition: border-color 0.2s, transform 0.15s;
}
.card:hover { border-color: rgba(96,165,250,0.25); transform: translateY(-1px); }
.card-header {
  padding: 1.2rem 1.4rem 1rem;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  display: flex; justify-content: space-between; align-items: flex-start; gap: 0.75rem;
}
.ticker { font-size: 1.6rem; font-weight: 800; color: #f8fafc; letter-spacing: 1px; }
.fund-name { font-size: 0.76rem; color: #64748b; margin-top: 3px; }
.category-pill {
  font-size: 0.66rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
  padding: 0.28rem 0.6rem; border-radius: 99px; white-space: nowrap; margin-top: 3px;
  background: rgba(167,139,250,0.12); border: 1px solid rgba(167,139,250,0.28); color: #a78bfa;
}
.tbl { width: 100%; border-collapse: collapse; }
.tbl thead th {
  font-size: 0.66rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
  color: #334155; padding: 0.55rem 1.4rem;
  border-bottom: 1px solid rgba(255,255,255,0.05); text-align: left;
}
.tbl thead th.r { text-align: right; }
.tbl tbody td {
  padding: 0.6rem 1.4rem; font-size: 0.88rem;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.tbl tbody tr:last-child td { border-bottom: none; }
.tbl tbody tr:hover td { background: rgba(255,255,255,0.025); }
.period { font-weight: 600; color: #94a3b8; }
.ret { text-align: right; font-weight: 700; font-variant-numeric: tabular-nums; }
.pos { color: #4ade80; }
.neg { color: #f87171; }
.nil { color: #334155; }
.rank-cell { text-align: right; }
.rank-wrap { display: inline-flex; align-items: center; gap: 6px; }
.rank-val { font-variant-numeric: tabular-nums; color: #94a3b8; font-size: 0.82rem; }
.badge { font-size: 0.63rem; font-weight: 700; padding: 0.16rem 0.4rem; border-radius: 99px; }
.b-top { background: rgba(74,222,128,0.15); color: #4ade80; }
.b-mid { background: rgba(251,191,36,0.15); color: #fbbf24; }
.b-bot { background: rgba(248,113,113,0.15); color: #f87171; }
@keyframes shimmer {
  from { background-position: -200% 0; }
  to   { background-position:  200% 0; }
}
.sk {
  display: inline-block; border-radius: 4px;
  background: linear-gradient(90deg,
    rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.04) 75%);
  background-size: 200% 100%; animation: shimmer 1.4s infinite;
}
.err { grid-column: 1/-1; text-align: center; padding: 3rem; color: #f87171; font-size: 0.9rem; }
</style>
</head>
<body>

<div class="header">
  <h1>Fund Performance Dashboard</h1>
  <div class="header-right">
    <span class="updated" id="upd">—</span>
    <button class="refresh-btn" id="rbtn" onclick="load()">&#8635; Refresh</button>
  </div>
</div>

<div class="grid" id="grid"></div>

<script>
// ── Config ────────────────────────────────────────────────────────────────
const PROXY = "https://corsproxy.io/?";
const YF    = "https://query1.finance.yahoo.com/v8/finance/chart/";

const FUNDS = {
  "CGDV": { name: "Capital Group Dividend Value ETF", category: "Large Value"  },
  "CGGR": { name: "Capital Group Growth ETF",         category: "Large Growth" },
  "CGUS": { name: "Capital Group Core Equity ETF",    category: "Large Blend"  },
  "CGMM": { name: "Cap Group Core Municipal Market",  category: "Muni Bond"    },
};

const PEERS = {
  "Large Value":  ["VTV","IVE","DVY","VYM","SCHD","RPV","IWD"],
  "Large Growth": ["VUG","IVW","SPYG","QQQ","MGK","IWF"],
  "Large Blend":  ["SPY","IVV","VOO","VV","SCHX","VTI"],
  "Muni Bond":    ["MUB","VTEB","TFI","CMF","HYMB"],
};

// ── Fetch ─────────────────────────────────────────────────────────────────
async function fetchPrices(ticker) {
  try {
    const url = PROXY + encodeURIComponent(YF + ticker + "?interval=1d&range=6y");
    const res  = await fetch(url);
    const json = await res.json();
    const result = json.chart.result[0];
    const ts     = result.timestamp;
    const closes = result.indicators.adjclose[0].adjclose;
    return ts.map((t, i) => ({ ms: t * 1000, c: closes[i] })).filter(p => p.c != null);
  } catch { return null; }
}

// ── Calculations ──────────────────────────────────────────────────────────
function ret1d(prices) {
  if (!prices || prices.length < 2) return null;
  return (prices.at(-1).c / prices.at(-2).c - 1) * 100;
}

function retPeriod(prices, startMs, annualize, years) {
  if (!prices || prices.length < 2) return null;
  const entry = prices.find(p => p.ms >= startMs);
  if (!entry) return null;
  const raw = prices.at(-1).c / entry.c - 1;
  const r   = (annualize && years > 1) ? ((1 + raw) ** (1 / years) - 1) : raw;
  return r * 100;
}

function rank(ticker, category, retMap) {
  const peers = PEERS[category] || [];
  const universe = {};
  [ticker, ...peers].forEach(t => { if (retMap[t] != null) universe[t] = retMap[t]; });
  if (!(ticker in universe)) return [null, null];
  const sorted = Object.keys(universe).sort((a, b) => universe[b] - universe[a]);
  return [sorted.indexOf(ticker) + 1, sorted.length];
}

// ── UI helpers ────────────────────────────────────────────────────────────
const PERIOD_LABELS = ["1D","1M","YTD","1Y","3Y","5Y"];

function skeleton() {
  const rows = PERIOD_LABELS.map(() => `<tr>
    <td><span class="sk" style="width:26px;height:.82em"></span></td>
    <td class="ret"><span class="sk" style="width:60px;height:.82em"></span></td>
    <td class="rank-cell"><span class="sk" style="width:52px;height:.82em"></span></td>
  </tr>`).join("");
  return `<div class="card">
    <div class="card-header">
      <div>
        <div class="sk" style="width:78px;height:1.4em;margin-bottom:6px;border-radius:6px"></div>
        <div class="sk" style="width:200px;height:.72em"></div>
      </div>
      <div class="sk" style="width:72px;height:1.1em;border-radius:99px;margin-top:4px"></div>
    </div>
    <table class="tbl">
      <thead><tr><th>Period</th><th class="r">Return</th><th class="r">Peer Rank</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function fmt(val) {
  if (val == null) return { t: "—", c: "nil" };
  return { t: (val >= 0 ? "+" : "") + val.toFixed(2) + "%", c: val >= 0 ? "pos" : "neg" };
}

function badge(r, total) {
  if (!r || !total) return "";
  const pct = r / total;
  const cls = pct <= 0.33 ? "b-top" : pct <= 0.66 ? "b-mid" : "b-bot";
  return `<span class="badge ${cls}">${Math.round(pct * 100)}th pct</span>`;
}

function buildCard(ticker, info, periods) {
  const rows = periods.map(p => {
    const r = fmt(p.ret);
    const rankHtml = p.rank != null
      ? `<div class="rank-wrap"><span class="rank-val">${p.rank}&thinsp;/&thinsp;${p.total}</span>${badge(p.rank, p.total)}</div>`
      : `<span style="color:#334155">—</span>`;
    return `<tr>
      <td><span class="period">${p.label}</span></td>
      <td class="ret ${r.c}">${r.t}</td>
      <td class="rank-cell">${rankHtml}</td>
    </tr>`;
  }).join("");
  return `<div class="card">
    <div class="card-header">
      <div>
        <div class="ticker">${ticker}</div>
        <div class="fund-name">${info.name}</div>
      </div>
      <div class="category-pill">${info.category}</div>
    </div>
    <table class="tbl">
      <thead><tr><th>Period</th><th class="r">Return</th><th class="r">Peer Rank</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

// ── Main ──────────────────────────────────────────────────────────────────
async function load() {
  const btn  = document.getElementById("rbtn");
  const grid = document.getElementById("grid");
  btn.disabled = true;
  btn.textContent = "Loading…";
  grid.innerHTML = Array.from({ length: 4 }, skeleton).join("");

  try {
    const now   = new Date();
    const ytd   = new Date(now.getFullYear(), 0, 1).getTime();
    const ms1m  = now.getTime() - 30  * 86400000;
    const ms1y  = now.getTime() - 365 * 86400000;
    const ms3y  = now.getTime() - 365 * 3 * 86400000;
    const ms5y  = now.getTime() - 365 * 5 * 86400000;

    // All unique tickers
    const allTickers = [...new Set([
      ...Object.keys(FUNDS),
      ...Object.values(PEERS).flat()
    ])];

    // Fetch all in parallel
    const results = await Promise.all(allTickers.map(t => fetchPrices(t)));
    const priceMap = {};
    allTickers.forEach((t, i) => { priceMap[t] = results[i]; });

    // Returns for every ticker × period
    const retMaps = {
      "1D":  {}, "1M": {}, "YTD": {},
      "1Y":  {}, "3Y": {}, "5Y":  {}
    };
    allTickers.forEach(t => {
      const p = priceMap[t];
      if (!p) return;
      const r1d  = ret1d(p);
      const r1m  = retPeriod(p, ms1m, false, 1);
      const rYTD = retPeriod(p, ytd,  false, 1);
      const r1y  = retPeriod(p, ms1y, false, 1);
      const r3y  = retPeriod(p, ms3y, true,  3);
      const r5y  = retPeriod(p, ms5y, true,  5);
      if (r1d  != null) retMaps["1D"][t]  = r1d;
      if (r1m  != null) retMaps["1M"][t]  = r1m;
      if (rYTD != null) retMaps["YTD"][t] = rYTD;
      if (r1y  != null) retMaps["1Y"][t]  = r1y;
      if (r3y  != null) retMaps["3Y"][t]  = r3y;
      if (r5y  != null) retMaps["5Y"][t]  = r5y;
    });

    // Build cards
    const cards = Object.entries(FUNDS).map(([ticker, info]) => {
      const periods = PERIOD_LABELS.map(label => {
        const ret          = retMaps[label][ticker] ?? null;
        const [r, total]   = rank(ticker, info.category, retMaps[label]);
        return { label, ret, rank: r, total };
      });
      return buildCard(ticker, info, periods);
    });

    grid.innerHTML = cards.join("");
    document.getElementById("upd").textContent =
      "Updated " + now.toLocaleString("en-US", { month:"short", day:"numeric",
        year:"numeric", hour:"numeric", minute:"2-digit" });

  } catch (e) {
    grid.innerHTML = `<div class="err">Failed to load data: ${e.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = "↻ Refresh";
  }
}

setInterval(load, 15 * 60 * 1000);
load();
</script>
</body>
</html>
